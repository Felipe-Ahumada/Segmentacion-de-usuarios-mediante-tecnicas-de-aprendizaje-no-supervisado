name: CI Pipeline

on:
  push:
    branches: [main, Felipe, Francisca]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Tests unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r ml-service/requirements.txt

      - name: Ejecutar tests con pytest
        run: python -m pytest tests/ -v

  docker-build:
    name: Build y test con Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Crear archivo .env
        run: cp .env.example .env

      - name: Construir imágenes Docker
        run: docker compose build

      - name: Levantar servicios
        run: docker compose up -d

      - name: Esperar a que ml-service esté healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose ps ml-service | grep -q healthy; then
              echo "ml-service healthy"
              exit 0
            fi
            echo "Esperando ml-service... intento $i"
            sleep 10
          done
          echo "ml-service no respondió"
          docker compose logs ml-service
          exit 1

      - name: Verificar API responde
        run: |
          curl -f http://localhost:8000/ || exit 1
          curl -f http://localhost:8000/dashboard-data || exit 1
          curl -f http://localhost:8000/supervised-data || exit 1

      - name: Ejecutar tests en contenedor
        run: docker compose run --rm tests

      - name: Detener servicios
        if: always()
        run: docker compose down -v
